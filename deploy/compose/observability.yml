name: dailywerk-observability

services:
  prometheus:
    image: prom/prometheus:v3.7.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ${DAILYWERK_ROOT:-/srv/dailywerk}/deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability
      - infra
      - edge

  grafana:
    image: grafana/grafana:12.2.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ${DAILYWERK_ROOT:-/srv/dailywerk}/deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DAILYWERK_ROOT:-/srv/dailywerk}/deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - observability

  loki:
    image: grafana/loki:3.5.6
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ${DAILYWERK_ROOT:-/srv/dailywerk}/deploy/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:3.5.6
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ${DAILYWERK_ROOT:-/srv/dailywerk}/deploy/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.53.0
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - observability

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_SUPERUSER:-postgres}
      DATA_SOURCE_PASS: ${POSTGRES_SUPERUSER_PASSWORD:?set POSTGRES_SUPERUSER_PASSWORD}
    networks:
      - observability
      - infra

  valkey-exporter:
    image: oliver006/redis_exporter:v1.80.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://valkey:6379
    networks:
      - observability
      - infra

networks:
  observability:
    name: dailywerk-observability
  infra:
    external: true
    name: dailywerk-infra
  edge:
    external: true
    name: dailywerk-edge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
