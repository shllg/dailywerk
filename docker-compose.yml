services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${DAILYWERK_PG_PORT:-5452}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --save "" --appendonly no
    ports:
      - "${DAILYWERK_REDIS_PORT:-6399}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_VOLUMES: /data
    ports:
      - "${DAILYWERK_S3_PORT:-9002}:9000"
      - "${DAILYWERK_S3_CONSOLE_PORT:-9003}:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  rustfs-setup:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://rustfs:9000 rustfsadmin rustfsadmin &&
      mc mb --ignore-existing local/dailywerk-dev &&
      echo 'Bucket dailywerk-dev created'
      "
    restart: "no"
    profiles:
      - setup

  mailcatcher:
    image: sj26/mailcatcher:latest
    ports:
      - "${DAILYWERK_MAIL_WEB_PORT:-1090}:1080"
      - "${DAILYWERK_MAIL_SMTP_PORT:-1035}:1025"

volumes:
  postgres_data:
  rustfs_data:
